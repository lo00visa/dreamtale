<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamArchive · 梦境档案馆</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<style>
/* ========== 主题变量 ========== */
:root {
  --pink: #FF6B9D;
  --purple: #A855F7;
  --blue: #5B9CFF;
  --cyan: #06B6D4;
  --gold: #F59E0B;
  --green: #10B981;
  --bg: #0D0D1A;
  --bg-card: #151528;
  --bg-card-hover: #1E1E38;
  --text: #E8E6F0;
  --text-light: #8B8AA0;
  --border: #2D2B45;
  --gradient: linear-gradient(135deg, #FF6B9D 0%, #A855F7 50%, #06B6D4 100%);
}
[data-theme="light"] {
  --bg: #F8F5FC;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F3F0FA;
  --text: #1A1625;
  --text-light: #6B6880;
  --border: #E5E0F0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; transition: background 0.3s, color 0.3s; }

/* ========== 登录页 ========== */
.login-page {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 2000;
}
.login-page.hidden { display: none; }
.login-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 40px 35px;
  width: 100%;
  max-width: 380px;
  position: relative;
  z-index: 1;
}
.login-title {
  text-align: center;
  margin-bottom: 35px;
}
.login-title h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 6px;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-title p {
  color: var(--text-light);
  font-size: 13px;
  letter-spacing: 1px;
}
.login-form { width: 100%; }
.login-form .form-group {
  margin-bottom: 18px;
}
.login-form label {
  display: block;
  font-size: 12px;
  color: var(--text-light);
  margin-bottom: 8px;
}
.login-form input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 14px;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.login-form input:focus { border-color: var(--purple); }
.login-form input::placeholder { color: var(--text-light); }
.login-btn {
  width: 100%;
  background: var(--gradient);
  border: none;
  color: white;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 600;
  margin-top: 10px;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-btn:active { opacity: 0.8; }
.login-toggle {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-light);
}
.login-toggle a {
  color: var(--purple);
  cursor: pointer;
  text-decoration: none;
}
.login-toggle a:hover { text-decoration: underline; }
.login-error {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 18px;
  color: #EF4444;
  font-size: 13px;
  text-align: center;
  display: none;
}
.login-error.show { display: block; }

/* ========== 主应用（未登录时隐藏） ========== */
.main-app { display: none; }
.main-app.show { display: block; }

/* ========== 头部 ========== */
.header { text-align: center; padding: 50px 20px 30px; position: relative; }
.header::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%); pointer-events: none; }
.header h1 { font-size: 32px; font-weight: 300; letter-spacing: 8px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
.header p { color: var(--text-light); font-size: 14px; letter-spacing: 2px; }

/* ========== 设置栏 ========== */
.settings-bar { position: fixed; top: 15px; right: 15px; z-index: 100; display: flex; gap: 8px; }
.settings-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; font-size: 14px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 6px; }
.settings-btn:hover { background: var(--bg-card-hover); }

/* ========== 搜索栏 ========== */
.search-section { padding: 0 20px; margin-bottom: 20px; }
.search-bar { display: flex; gap: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 6px; }
.search-bar input { flex: 1; background: transparent; border: none; padding: 14px 16px; font-size: 15px; color: var(--text); outline: none; }
.search-bar input::placeholder { color: var(--text-light); }
.search-btn { background: var(--gradient); border: none; color: white; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; }

/* ========== 导航 ========== */
.nav { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 25px; overflow-x: auto; justify-content: flex-start; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { background: var(--bg-card); border: 1px solid var(--border); padding: 12px 18px; border-radius: 14px; cursor: pointer; font-size: 14px; color: var(--text); white-space: nowrap; transition: all 0.2s; }
.nav-btn.active { background: var(--gradient); color: white; border-color: transparent; }
.nav-btn:hover:not(.active) { background: var(--bg-card-hover); }

/* ========== 页面 ========== */
.page { display: none; padding: 0 20px; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ========== 统计卡片 ========== */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 15px; text-align: center; }
.stat-card .icon { font-size: 24px; margin-bottom: 8px; }
.stat-card .num { font-size: 28px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

/* ========== 筛选标签 ========== */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.filter-btn { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--text-light); transition: all 0.2s; }
.filter-btn.active { background: var(--gradient); color: white; border-color: transparent; }

/* ========== 梦境卡片 ========== */
.dream-list { display: flex; flex-direction: column; gap: 15px; }
.dream-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.dream-card:hover { transform: translateY(-3px); border-color: var(--purple); box-shadow: 0 10px 40px rgba(168,85,247,0.15); }
.dream-date { font-size: 12px; color: var(--text-light); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.dream-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
.dream-content { font-size: 14px; color: var(--text-light); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dream-meta { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.dream-tag { background: rgba(168,85,247,0.15); padding: 5px 12px; border-radius: 10px; font-size: 12px; color: var(--purple); }
.dream-emotion { font-size: 12px; padding: 5px 12px; border-radius: 10px; background: rgba(6,182,212,0.15); color: var(--cyan); }

/* ========== 弹窗 ========== */
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
.modal.show { display: flex; }
.modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 30px; }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-light); line-height: 1; }
.modal-title { font-size: 20px; font-weight: 600; }
.modal-date { font-size: 13px; color: var(--text-light); margin-top: 5px; }

/* ========== 解读风格选择 ========== */
.analysis-selector { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.analysis-style-btn { flex: 1; min-width: 140px; background: var(--bg); border: 2px solid var(--border); padding: 15px 12px; border-radius: 14px; cursor: pointer; text-align: center; transition: all 0.2s; }
.analysis-style-btn:hover { border-color: var(--purple); }
.analysis-style-btn.active { border-color: var(--purple); background: rgba(168,85,247,0.1); }
.analysis-style-btn .style-icon { font-size: 24px; margin-bottom: 8px; }
.analysis-style-btn .style-name { font-size: 14px; font-weight: 600; }
.analysis-style-btn .style-desc { font-size: 11px; color: var(--text-light); margin-top: 4px; }

/* ========== 解读内容 ========== */
.analysis-content { font-size: 14px; line-height: 1.9; color: var(--text); }
.analysis-content h3 { font-size: 16px; margin: 20px 0 10px; color: var(--purple); }
.analysis-content p { margin-bottom: 12px; }
.analysis-content table { width: 100%; border-collapse: collapse; margin: 15px 0; }
.analysis-content th, .analysis-content td { padding: 10px 12px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
.analysis-content th { background: var(--bg); color: var(--purple); }

/* ========== 日历 ========== */
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.calendar-nav { display: flex; gap: 15px; align-items: center; }
.calendar-nav-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; cursor: pointer; color: var(--text); font-size: 14px; }
.calendar-month { font-size: 18px; font-weight: 600; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
.calendar-weekday { font-size: 12px; color: var(--text-light); padding: 10px 0; font-weight: 600; }
.calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-size: 14px; }
.calendar-day:hover { border-color: var(--purple); transform: scale(1.05); }
.calendar-day.has-dream { background: var(--gradient); color: white; border-color: transparent; }
.calendar-day.today { border-color: var(--gold); }
.calendar-day .day-count { font-size: 10px; margin-top: 2px; opacity: 0.8; }

/* ========== 日历统计 ========== */
.calendar-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
.calendar-stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
.calendar-stat-card .stat-label { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
.calendar-stat-card .stat-value { font-size: 24px; font-weight: 700; color: var(--purple); }
.calendar-stat-card .stat-sub { font-size: 11px; color: var(--text-light); margin-top: 4px; }

/* ========== 人物页面 ========== */
.people-section { margin-bottom: 30px; }
.people-section-title { font-size: 14px; color: var(--text-light); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.person-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.2s; }
.person-card:hover { border-color: var(--purple); transform: translateY(-2px); }
.person-card .emoji { font-size: 36px; margin-bottom: 10px; }
.person-card .name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.person-card .relation { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
.person-card .count { font-size: 20px; font-weight: 700; color: var(--pink); }
.person-card .count-label { font-size: 11px; color: var(--text-light); }

/* ========== 人物详情 ========== */
.person-detail { display: none; }
.person-detail.active { display: block; }
.person-detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.person-detail-header .emoji { font-size: 60px; }
.person-detail-header .info h2 { font-size: 22px; margin-bottom: 5px; }
.person-detail-header .info .relation-tag { display: inline-block; background: rgba(168,85,247,0.15); color: var(--purple); padding: 5px 12px; border-radius: 10px; font-size: 13px; }
.person-dreams { margin-top: 20px; }
.person-dreams h4 { font-size: 14px; color: var(--text-light); margin-bottom: 12px; }
.person-dream-item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
.person-dream-item:hover { border-color: var(--purple); }
.person-dream-item .date { font-size: 12px; color: var(--text-light); margin-bottom: 5px; }
.person-dream-item .title { font-size: 14px; font-weight: 500; }

/* ========== 统计页面 ========== */
.stats-section { margin-bottom: 25px; }
.stats-section-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
.chart-container { height: 250px; position: relative; }
.top-list { display: grid; gap: 12px; }
.top-item { display: flex; align-items: center; gap: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 15px 18px; }
.top-item .rank { width: 28px; height: 28px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; }
.top-item .top-emoji { font-size: 28px; }
.top-item .top-info { flex: 1; }
.top-item .top-name { font-size: 15px; font-weight: 600; }
.top-item .top-relation { font-size: 12px; color: var(--text-light); }
.top-item .top-count { font-size: 20px; font-weight: 700; color: var(--pink); }

/* ========== 表单 ========== */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 14px; background: var(--bg); color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--purple); }
.form-group textarea { min-height: 150px; resize: vertical; }
.save-btn { width: 100%; background: var(--gradient); border: none; color: white; padding: 16px; border-radius: 14px; font-size: 16px; cursor: pointer; font-weight: 600; }

/* ========== 底部 ========== */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 20px; z-index: 50; }
.bottom-nav-btn { background: none; border: none; color: var(--text-light); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 5px 15px; border-radius: 12px; transition: all 0.2s; }
.bottom-nav-btn .icon { font-size: 22px; }
.bottom-nav-btn.active { color: var(--purple); }

/* ========== 空状态 ========== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 60px; margin-bottom: 15px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .header h1 { font-size: 26px; letter-spacing: 5px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .nav { padding: 0 15px; }
  .nav-btn { padding: 10px 14px; font-size: 13px; }
  .modal-content { padding: 20px; margin: 10px; }
  .analysis-selector { flex-direction: column; }
  .analysis-style-btn { min-width: 100%; }
  .login-box { padding: 30px 25px; }
}
</style>
</head>
<body>

<!-- ========== 登录页 ========== -->
<div class="login-page" id="login-page">
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-title">
      <h1>DreamArchive</h1>
      <p>梦境档案馆 · 探索潜意识的深处</p>
    </div>
    <div class="login-error" id="login-error">用户名或密码错误</div>
    <div class="login-form" id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="handleLogin()">登录</button>
      <div class="login-toggle">
        还没有账号？<a onclick="showRegister()">立即注册</a>
      </div>
    </div>
    <div class="login-form" id="register-form" style="display: none;">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="3-20位字母或数字" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="至少6位" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-password-confirm" placeholder="再次输入密码" autocomplete="new-password">
      </div>
      <button class="login-btn" onclick="handleRegister()">注册</button>
      <div class="login-toggle">
        已有账号？<a onclick="showLogin()">返回登录</a>
      </div>
    </div>
  </div>
</div>

<!-- ========== 主应用 ========== -->
<div class="main-app" id="main-app">

  <!-- 设置栏 -->
  <div class="settings-bar">
    <button class="settings-btn" onclick="showDataModal()" id="user-btn">
      👤 <span id="user-name-display">用户</span>
    </button>
    <button class="settings-btn" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
    </button>
    <button class="settings-btn" onclick="handleLogout()" title="退出登录">
      🚪
    </button>
  </div>

  <!-- 头部 -->
  <div class="header">
    <h1>DreamArchive</h1>
    <p>梦境档案馆 · 探索潜意识的深处</p>
  </div>

  <!-- 项目介绍 -->
  <div class="card" style="margin: 0 20px 20px; background: linear-gradient(135deg, rgba(168,85,247,0.15) 0%, rgba(6,182,212,0.15) 100%); border: 1px solid var(--border);">
    <div style="text-align: center; padding: 10px 0;">
      <p style="font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 15px;">
        一个帮助用户<strong>记录、解读和分析梦境</strong>的多用户 Web 应用
      </p>
      <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 15px;">
        <span style="background: var(--bg-card); padding: 6px 14px; border-radius: 20px; font-size: 12px;">🛠 纯前端架构</span>
        <span style="background: var(--bg-card); padding: 6px 14px; border-radius: 20px; font-size: 12px;">👥 多用户系统</span>
        <span style="background: var(--bg-card); padding: 6px 14px; border-radius: 20px; font-size: 12px;">📊 数据可视化</span>
      </div>

function handleLogin() {
  const username = document.getElementById('login-username')?.value.trim();
  const password = document.getElementById('login-password')?.value;
  
  if (!username || !password) {
    document.getElementById('login-error').textContent = '请输入用户名和密码';

      document.getElementById('login-error').classList.add('show');
      return;
    }
    
    currentUser = 'lovisa';
    localStorage.setItem('dreamarchive_last_user', 'lovisa');
    showMainApp();
    return;
  }
  
  // 普通账号登录
  const users = getUsersDB();
  if (!users[username] || users[username].password !== password) {
    document.getElementById('login-error').textContent = '用户名或密码错误';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  currentUser = username;
  localStorage.setItem('dreamarchive_last_user', username);
  showMainApp();
}

function handleRegister() {
  const username = document.getElementById('reg-username')?.value.trim();
  const password = document.getElementById('reg-password')?.value;
  const passwordConfirm = document.getElementById('reg-password-confirm')?.value;
  
  if (!username || !password) {
    document.getElementById('login-error').textContent = '请填写所有字段';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  if (username.length < 3 || username.length > 20) {
    document.getElementById('login-error').textContent = '用户名需要3-20位';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  if (!/^[a-zA-Z0-9]+$/.test(username)) {
    document.getElementById('login-error').textContent = '用户名只能包含字母和数字';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  if (password.length < 6) {
    document.getElementById('login-error').textContent = '密码至少6位';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  if (password !== passwordConfirm) {
    document.getElementById('login-error').textContent = '两次密码不一致';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  const users = getUsersDB();
  if (users[username]) {
    document.getElementById('login-error').textContent = '用户名已存在';
    document.getElementById('login-error').classList.add('show');
    return;
  }
  
  // 创建用户
  users[username] = { 
    password: password, 
    createdAt: new Date().toISOString(),
    settings: {}
  };
  saveUsersDB(users);
  
  // 自动登录
  currentUser = username;
  localStorage.setItem('dreamarchive_last_user', username);
  showMainApp();
}

  // 清空输入

  showLogin();

function exportMyData() {
  if (!currentUser) {
    alert('请先登录');
    return;
  }
  
  const data = {
    version: '1.0',
    user: currentUser,
    exportedAt: new Date().toISOString(),
    dreams: dreams
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `DreamArchive_${currentUser}_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

      const data = JSON.parse(e.target.result);
      if (data.dreams && Array.isArray(data.dreams)) {
        if (confirm(`将导入 ${data.dreams.length} 条梦境。是否合并到现有数据？`)) {
          dreams = [...dreams, ...data.dreams];
          dreams.sort((a, b) => new Date(b.date) - new Date(a.date));
          saveUserDreams(currentUser, dreams);
          saveDreams();
          closeDataModal();
          renderHome();
          alert('导入成功！');
        }
      } else {
        alert('无效的数据格式');
      }
    } catch (err) {
      alert('文件解析失败');
    }
  };
  reader.readAsText(file);
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {

  const lastUser = localStorage.getItem('dreamarchive_last_user');
  
  if (lastUser) {
    const users = getUsersDB();

      currentUser = lastUser;
      showMainApp();
    } else {

      document.getElementById('login-page').classList.remove('hidden');
    }
  } else {

    document.getElementById('login-page').classList.remove('hidden');
  }
  
  // 回车登录
  document.getElementById('login-password')?.addEventListener('keypress', (e) => {

  });
});

function loadUserDreams() {
  if (!currentUser) {
    dreams = [];
    return;
  }
  
  const stored = getUserDreams(currentUser);
  if (stored) {
    dreams = stored;
  } else {
    // 新用户，使用默认示例
    dreams = getDefaultDreams();
    saveUserDreams(currentUser, dreams);
    saveDreams();
  }
}

function saveDreams() {

}

// ========== 页面切换 ==========
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="switchPage('${pageId}')"]`)?.classList.add('active');
  
  updateBottomNav();
  
  if (pageId === 'home') renderHome();
  else if (pageId === 'calendar') renderCalendar();
  else if (pageId === 'people') renderPeople();
  else if (pageId === 'stats') renderStats();
}

function updateBottomNav() {
  const activePage = document.querySelector('.page.active')?.id.replace('page-', '') || 'home';
  document.querySelectorAll('.bottom-nav-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.onclick?.toString().includes(activePage)) {
      btn.classList.add('active');
    }
  });
}

function applyFilter() {
  let filtered = dreams;
  if (currentFilter !== 'all') {
    filtered = dreams.filter(d => {
      const content = (d.title + ' ' + d.content).toLowerCase();
      if (currentFilter === '情感') return /lyc|zjx|wd|甘子玉|高尔夫|暧昧|喜欢|爱/i.test(content);
      if (currentFilter === '家庭') return /妈妈|爸爸|弟弟|外婆|阿公|家|亲人/i.test(content);
      if (currentFilter === '焦虑') return /考试|考研|毕业|工作|焦虑|害怕|恐惧/i.test(content);
      if (currentFilter === '神秘') return /鬼|超自然|神秘|奇怪/i.test(content);
      if (currentFilter === '日常') return true;
      return true;
    });
  }
  
  filteredDreams = filtered;
  renderDreamList(filtered);
}

function setFilter(filter) {

// ========== 人物统计 ==========
function countPeople() {
  const counts = {};
  dreams.forEach(d => {
    const people = extractPeople(d.content + ' ' + d.title);
    people.forEach(p => {
      counts[p] = (counts[p] || 0) + 1;
    });
  });
  
  const grouped = {};
  Object.entries(counts).forEach(([name, count]) => {
    const info = PERSON_DB[name];
    const relation = info?.relation || '其他';
    if (!grouped[relation]) grouped[relation] = [];
    grouped[relation].push({ name, count, info });
  });
  
  return { total: Object.keys(counts).length, byRelation: grouped, counts };
}

function extractPeople(text) {
  const found = [];
  Object.entries(PERSON_ALIASES).forEach(([mainName, aliases]) => {
    if (aliases.some(alias => text.includes(alias))) {
      if (!found.includes(mainName)) found.push(mainName);
    }
  });
  return found;
}

// ========== 日历页面 ==========
function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  document.getElementById('calendar-month-label').textContent = `${year}年${month + 1}月`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay();
  
  const monthDreams = dreams.filter(d => {
    const dDate = new Date(d.date);
    return dDate.getFullYear() === year && dDate.getMonth() === month;
  });
  
  let html = ['日', '一', '二', '三', '四', '五', '六'].map(d => 
    `<div class="calendar-weekday">${d}</div>`
  ).join('');
  
  const today = new Date();
  for (let i = 0; i < startWeekday; i++) {
    html += '<div class="calendar-day" style="opacity: 0;"></div>';
  }
  
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dayDreams = dreams.filter(d => d.date === dateStr);
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
    const hasDream = dayDreams.length > 0;
    
    html += `
      <div class="calendar-day ${hasDream ? 'has-dream' : ''} ${isToday ? 'today' : ''}" 
           onclick="${hasDream ? `showDayDreams('${dateStr}')` : ''}">
        <span>${day}</span>
        ${hasDream ? `<span class="day-count">${dayDreams.length}个</span>` : ''}
      </div>
    `;
  }
  
  document.getElementById('calendar-grid').innerHTML = html;
  
  document.getElementById('calendar-stats').innerHTML = `
    <div class="calendar-stat-card">
      <div class="stat-label">本月记录</div>
      <div class="stat-value">${monthDreams.length}</div>
      <div class="stat-sub">梦境</div>
    </div>
    <div class="calendar-stat-card">
      <div class="stat-label">活跃天数</div>
      <div class="stat-value">${new Set(monthDreams.map(d => d.date)).size}</div>
      <div class="stat-sub">天</div>
    </div>
  `;
  
  renderMonthlyChart();
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function showDayDreams(dateStr) {

        '阴影（Shadow）：梦中出现的某些人物可能代表你性格中被否认的一面',
        '人格面具（Persona）：你在梦中如何呈现自己，反映了社会角色的扮演',
        '阿尼玛/阿尼姆斯：梦中异性的出现可能象征内在的异性特质'
      ],
      conclusion: '尝试接纳梦中的各种意象，它们都是你完整人格的一部分。'
    },
    deleuze: {
      intro: '德勒兹的欲望哲学将梦境视为解域化的场域——边界消融、身份流动。',
      themes: [
        '解域化（Deterritorialization）：梦中时间空间的流动打破了日常逻辑',
        '块茎思维（Rhizome）：梦境以非线性、多中心的方式展开',
        '生成（Becoming）：梦中的你不是"你"，而是一种生成状态'
      ],
      conclusion: '不要试图"解读"梦，而是体验它——让它自由流动，捕捉那些转瞬即逝的感受。'
    },
    zhou: {
      intro: '《周公解梦》认为梦境与现实存在象征对应关系。梦中之人、之物皆有征兆。',
      themes: [
        '人物象征：梦见不同的人对应不同的运势和人际关系',
        '场景寓意：梦中的地点暗示当前生活状态',
        '意象吉凶：某些特定意象在传统文化中有明确的解释'
      ],
      conclusion: '传统解梦强调"日有所思，夜有所梦"，梦境是身心状态的反映。'
    }
  };
  
  const a = analyses[style];
  return `
    <p>${a.intro}</p>
    <h3>🔮 主题分析</h3>
    <ul style="margin: 15px 0; padding-left: 20px;">
      ${a.themes.map(t => `<li style="margin-bottom: 10px;">${t}</li>`).join('')}
    </ul>
    <h3>💡 温和提醒</h3>
    <p>${a.conclusion}</p>
    <table>
      <tr><th>元素</th><th>象征意义</th></tr>
      ${extractPeople(content).slice(0, 5).map(p => `<tr><td>${p}</td><td>${PERSON_DB[p]?.relation || '未知'}</td></tr>`).join('')}
    </table>
  `;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

// ========== 搜索 ==========
function performSearch(query) {
  if (!query.trim()) {
    applyFilter();
    return;
  }
  
  const lowerQuery = query.toLowerCase();
  filteredDreams = dreams.filter(d => 
    d.title.toLowerCase().includes(lowerQuery) ||
    d.content.toLowerCase().includes(lowerQuery) ||
    d.date.includes(query)
  );
  
  renderDreamList(filteredDreams);
}

// ========== 保存梦境 ==========
function saveNewDream() {
  const date = document.getElementById('add-date').value;
  const title = document.getElementById('add-title').value.trim();
  const content = document.getElementById('add-content').value.trim();
  const emotion = document.getElementById('add-emotion').value;
  
  if (!title || !content) {
    alert('请填写标题和内容');
    return;
  }
  
  const newDream = {
    id: 'd_' + Date.now(),
    date: date || new Date().toISOString().split('T')[0],
    title,
    content,
    emotion,
    analysis: {},
    extractedPeople: extractPeople(content)
  };
  
  dreams.unshift(newDream);
  saveDreams();
  
  document.getElementById('add-title').value = '';
  document.getElementById('add-content').value = '';
  
  switchPage('home');
}

// ========== 工具函数 ==========
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
}

function getWeekday(dateStr) {
  const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  return days[new Date(dateStr).getDay()];
}

function getMonthCount() {
  const now = new Date();
  return dreams.filter(d => {
    const dDate = new Date(d.date);
    return dDate.getFullYear() === now.getFullYear() && dDate.getMonth() === now.getMonth();
  }).length;
}
